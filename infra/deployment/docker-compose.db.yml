version: '3.8'
services:
  mongodb:
    image: mongo:6.0
    container_name: peopleflow-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: peopleflow-redis
    ports:
      - "6380:6379"

volumes:
  mongodb-data:
