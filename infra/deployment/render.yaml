services:
  - type: web
    name: peopleflow-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://peopleflow.vercel.app,http://localhost:3000
      - key: CORS_ORIGIN_REGEX
        value: ^https://peopleflow(?:-[a-z0-9-]+)*\.vercel\.app$

