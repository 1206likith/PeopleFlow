[mypy]
# Strict mode: enforce all type checking rules
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
disallow_untyped_defs = True
disallow_any_generics = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_optional = True

# Skip external libraries that don't have type hints
[mypy-motor.*]
ignore_missing_imports = True

[mypy-pymongo.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-starlette.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-detectron2.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

# Per-package settings for gradual typing
[mypy-app.services.*]
# Strict checking for high-value service modules
disallow_untyped_defs = True
disallow_any_generics = True
check_untyped_defs = True

[mypy-app.core.*]
# Strict for core business logic
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-app.api.*]
# Moderate checking for API routes (FastAPI provides some inference)
warn_return_any = True
warn_unused_ignores = True
