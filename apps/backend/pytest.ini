[pytest]
# Pytest configuration for PeopleFlow backend

minversion = 7.0

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    security: Security hardening tests
    performance: Performance benchmark tests
    integration: Integration tests
    unit: Unit tests
    smoke: Smoke tests

# Test output
addopts = -v --tb=short --strict-markers

# Asyncio
asyncio_mode = auto

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
